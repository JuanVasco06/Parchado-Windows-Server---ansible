---
- name: "INICIO | Mostrar inicio del flujo de parchado"
  hosts: localhost
  gather_facts: false

  tasks:
    - name: "Inicializar resumen global de parchado"
      ansible.builtin.set_fact:
        resumen_parchado: []

    - name: "Mostrar información inicial"
      ansible.builtin.debug:
        msg:
          - "Inicio de flujo de parchado Windows Server"
          - "Cliente: {{ cliente_nombre | default(tower_organization_name | default('No definido')) }}"
          - "Ejecutado desde AWX"
          - "Ambiente: {{ ambiente_objetivo | default('PRUEBAS') }}"
          - "Snapshot/checkpoint habilitado: {{ enable_snapshot | default(false) }}"
          - "Notificación Teams habilitada: {{ enable_teams_notification | default(false) }}"
          - "Instalación habilitada: {{ enable_patch_install | default(false) }}"
          - "Reinicio habilitado: {{ patch_reboot | default(false) }}"
          - "Categorías Windows Update: {{ windows_update_categories | default(['*']) }}"


- name: "VALIDACION | Precheck y busqueda de parches en Windows"
  hosts: windows
  gather_facts: false
  serial: 1

  tasks:
    - name: "Validar conectividad WinRM"
      ansible.windows.win_ping:
      register: win_ping_result

    - name: "Obtener hostname"
      ansible.windows.win_shell: hostname
      register: hostname_result
      changed_when: false

    - name: "Obtener información del sistema operativo"
      ansible.windows.win_shell: |
        Get-CimInstance Win32_OperatingSystem |
        Select-Object Caption, Version, BuildNumber, LastBootUpTime |
        ConvertTo-Json -Compress
      register: os_info
      changed_when: false

    - name: "Validar espacio libre en disco C"
      ansible.windows.win_shell: |
        Get-PSDrive C |
        Select-Object Name,
                      @{Name="FreeGB";Expression={[math]::Round($_.Free/1GB,2)}},
                      @{Name="UsedGB";Expression={[math]::Round($_.Used/1GB,2)}} |
        ConvertTo-Json -Compress
      register: disk_info
      changed_when: false

    - name: "Validar si hay reinicio pendiente antes de parchar"
      ansible.windows.win_shell: |
        $pending = $false

        if (Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Component Based Servicing\RebootPending") {
          $pending = $true
        }

        if (Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsUpdate\Auto Update\RebootRequired") {
          $pending = $true
        }

        if (Test-Path "HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\PendingFileRenameOperations") {
          $pending = $true
        }

        Write-Output $pending
      register: pending_reboot_precheck
      changed_when: false

    - name: "Validar procesos activos de Windows Update antes de iniciar"
      ansible.windows.win_shell: |
        $processes = Get-Process -ErrorAction SilentlyContinue |
          Where-Object { $_.ProcessName -match "wusa|TiWorker|TrustedInstaller|UsoClient|MoUsoCoreWorker" } |
          Select-Object ProcessName, Id, CPU, StartTime

        if ($processes) {
          $processes | ConvertTo-Json -Compress
        } else {
          Write-Output "SIN_PROCESOS_UPDATE_ACTIVOS"
        }
      register: update_processes_precheck
      changed_when: false
      failed_when: false

    - name: "Buscar actualizaciones disponibles sin instalar"
      ansible.windows.win_updates:
        category_names: "{{ windows_update_categories | default(['*']) }}"
        state: searched
        log_path: C:\Windows\Temp\ansible-win-updates-search.log
      register: updates_search_result
      failed_when: false

    - name: "Mostrar resumen de precheck"
      ansible.builtin.debug:
        msg:
          - "Servidor inventario: {{ inventory_hostname }}"
          - "IP: {{ ansible_host }}"
          - "Hostname: {{ hostname_result.stdout | trim }}"
          - "SO: {{ os_info.stdout | trim }}"
          - "Disco C: {{ disk_info.stdout | trim }}"
          - "Reinicio pendiente antes de parchar: {{ pending_reboot_precheck.stdout | trim }}"
          - "Procesos Windows Update activos: {{ update_processes_precheck.stdout | trim }}"
          - "Actualizaciones encontradas: {{ updates_search_result.found_update_count | default(0) }}"
          - "Actualizaciones fallidas en búsqueda: {{ updates_search_result.failed_update_count | default(0) }}"
          - "Gestión de Microsoft Defender: {{ 'habilitada' if (enable_defender_management | default(true) | bool) else 'deshabilitada (otro antivirus)' }}"


- name: "SNAPSHOT | Crear snapshot/checkpoint previo al parchado (multi-hipervisor)"
  hosts: windows
  gather_facts: false
  serial: 1

  vars:
    snapshot_name: "AWX_PRE_PATCH_{{ inventory_hostname }}_{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"
    # Credenciales VMware: se inyectan como variables de entorno en el Execution Environment / credencial AWX
    vmware_hostname: "{{ lookup('env', 'VMWARE_HOST') | default('', true) }}"
    vmware_username: "{{ lookup('env', 'VMWARE_USER') | default('', true) }}"
    vmware_password: "{{ lookup('env', 'VMWARE_PASSWORD') | default('', true) }}"

  tasks:
    - name: "VMware | Crear snapshot vía vCenter"
      vmware.vmware.vm_snapshot:
        hostname: "{{ vmware_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: "{{ vmware_validate_certs | default(false) }}"
        datacenter: "{{ vmware_datacenter }}"
        name: "{{ vmware_vm_name }}"
        snapshot_name: "{{ snapshot_name }}"
        description: "Snapshot previo a parchado Windows desde AWX sobre {{ inventory_hostname }}"
        state: present
      delegate_to: localhost
      register: snapshot_vmware
      when:
        - enable_snapshot | default(false) | bool
        - enable_patch_install | default(false) | bool
        - (hypervisor_type | default('')) == 'vmware'
        - vmware_hostname | length > 0
        - vmware_username | length > 0
        - vmware_password | length > 0
        - vmware_vm_name is defined

    - name: "Hyper-V | Crear checkpoint vía PowerShell en el host Hyper-V"
      ansible.windows.win_powershell:
        script: |
          $ErrorActionPreference = 'Stop'
          Checkpoint-VM -Name '{{ vm_name_hypervisor }}' -SnapshotName '{{ snapshot_name }}'
          Write-Output "Checkpoint '{{ snapshot_name }}' creado para la VM '{{ vm_name_hypervisor }}'"
      delegate_to: "{{ hyperv_host }}"
      register: snapshot_hyperv
      when:
        - enable_snapshot | default(false) | bool
        - enable_patch_install | default(false) | bool
        - (hypervisor_type | default('')) == 'hyperv'
        - hyperv_host is defined
        - vm_name_hypervisor is defined

    - name: "Advertir si el snapshot está habilitado pero el host no define hypervisor_type"
      ansible.builtin.debug:
        msg: >
          ADVERTENCIA: enable_snapshot=true pero {{ inventory_hostname }} no tiene
          hypervisor_type valido ('vmware' o 'hyperv'). No se creó snapshot/checkpoint.
      when:
        - enable_snapshot | default(false) | bool
        - (hypervisor_type | default('')) not in ['vmware', 'hyperv']

    - name: "Mostrar resultado del snapshot/checkpoint"
      ansible.builtin.debug:
        msg:
          - "Servidor          : {{ inventory_hostname }}"
          - "Hipervisor        : {{ hypervisor_type | default('no definido') }}"
          - "Snapshot creado   : {{ snapshot_name }}"
          - "Resultado VMware  : {{ snapshot_vmware.changed | default('no aplicado') }}"
          - "Resultado Hyper-V : {{ snapshot_hyperv.output | default('no aplicado') }}"
      when:
        - enable_snapshot | default(false) | bool


- name: "PATCH | Preparar e instalar actualizaciones Windows Server"
  hosts: windows
  gather_facts: false
  serial: 1

  tasks:
    - name: "Asegurar servicios requeridos para Windows Update"
      ansible.windows.win_service:
        name: "{{ item }}"
        state: started
      loop:
        - wuauserv
        - bits
        - cryptsvc
        - TrustedInstaller
      when:
        - enable_patch_install | default(false) | bool

    - name: "Registrar el servicio Microsoft Update (necesario para que Windows Update vea Defender/Office, no solo parches de SO)"
      ansible.windows.win_shell: |
        try {
          $muServiceId = "7971f918-a847-4430-9279-4a52d1efe18d"
          $manager = New-Object -ComObject Microsoft.Update.ServiceManager
          $manager.ClientApplicationID = "AnsibleAWX"
          $existing = $manager.Services | Where-Object { $_.ServiceID -eq $muServiceId }
          if ($existing) {
            Write-Output "Microsoft Update ya estaba registrado"
          } else {
            $manager.AddService2($muServiceId, 7, "") | Out-Null
            Write-Output "Microsoft Update registrado correctamente"
          }
        }
        catch {
          Write-Output "No se pudo registrar Microsoft Update: $($_.Exception.Message)"
          exit 0
        }
      register: mu_service_result
      changed_when: "'registrado correctamente' in mu_service_result.stdout"
      failed_when: false
      when:
        - enable_patch_install | default(false) | bool

    - name: "Mostrar resultado del registro de Microsoft Update"
      ansible.builtin.debug:
        msg: "{{ mu_service_result.stdout | default('No ejecutado') | trim }}"
      when:
        - enable_patch_install | default(false) | bool

    - name: "Actualizar firmas de Microsoft Defender antes de Windows Update"
      ansible.windows.win_shell: |
        try {
          if (Get-Command Update-MpSignature -ErrorAction SilentlyContinue) {
            Update-MpSignature -ErrorAction Stop
            Write-Output "Defender signatures updated successfully"
          } else {
            Write-Output "Update-MpSignature command not available"
          }
        }
        catch {
          Write-Output "Defender signature update failed or Defender not available: $($_.Exception.Message)"
          exit 0
        }
      register: defender_update
      changed_when: "'updated successfully' in defender_update.stdout"
      failed_when: false
      when:
        - enable_patch_install | default(false) | bool
        - enable_defender_management | default(true) | bool

    - name: "Mostrar resultado actualización Defender"
      ansible.builtin.debug:
        msg:
          - "Resultado Defender:"
          - "{{ defender_update.stdout | default('No ejecutado') | trim }}"
      when:
        - enable_patch_install | default(false) | bool
        - enable_defender_management | default(true) | bool

    - name: "Informar que la gestión de Defender está deshabilitada para este host"
      ansible.builtin.debug:
        msg: "Gestión de Microsoft Defender deshabilitada (enable_defender_management=false). Este servidor usa otro antivirus o no aplica."
      when:
        - enable_patch_install | default(false) | bool
        - not (enable_defender_management | default(true) | bool)

    - name: "Forzar escaneo y descarga de Windows Update similar a Retry"
      ansible.windows.win_shell: |
        try {
          UsoClient StartScan
          Start-Sleep -Seconds 20
          UsoClient StartDownload
          Start-Sleep -Seconds 30
          UsoClient StartInstall
          Start-Sleep -Seconds 20
          Write-Output "UsoClient retry commands executed"
        }
        catch {
          Write-Output "UsoClient execution failed: $($_.Exception.Message)"
          exit 0
        }
      register: windows_update_retry_trigger
      changed_when: true
      failed_when: false
      when:
        - enable_patch_install | default(false) | bool

    - name: "Esperar antes de instalar para evitar conflicto con descargas en progreso"
      ansible.windows.win_shell: |
        Start-Sleep -Seconds 60
        Write-Output "Espera completada"
      changed_when: false
      when:
        - enable_patch_install | default(false) | bool

    - name: "Instalar actualizaciones en ciclo hasta dejar el servidor sin pendientes (equivalente a repetir 'Install now' manualmente)"
      ansible.windows.win_updates:
        category_names: "{{ windows_update_categories | default(['*']) }}"
        reboot: "{{ patch_reboot | default(true) }}"
        reboot_timeout: "{{ patch_reboot_timeout | default(7200) }}"
        log_path: C:\Windows\Temp\ansible-win-updates.log
      register: patch_result
      retries: "{{ patch_max_passes | default(patch_retries) | default(3) }}"
      delay: "{{ patch_retry_delay | default(180) }}"
      until:
        - patch_result.failed_update_count | default(0) | int == 0
        - patch_result.found_update_count | default(0) | int == patch_result.installed_update_count | default(0) | int
      when:
        - enable_patch_install | default(false) | bool

    - name: "Forzar deteccion nativa de Windows Update (refresca 'Last checked' y el estado del panel Settings)"
      ansible.windows.win_shell: |
        try {
          (New-Object -ComObject Microsoft.Update.AutoUpdate).DetectNow()
          Write-Output "Deteccion nativa disparada"
        } catch {
          Write-Output "No se pudo disparar deteccion nativa: $($_.Exception.Message)"
          exit 0
        }
      register: native_detect_result
      changed_when: false
      failed_when: false
      when:
        - enable_patch_install | default(false) | bool

    - name: "Mostrar resultado de la deteccion nativa"
      ansible.builtin.debug:
        msg: "{{ native_detect_result.stdout | default('No ejecutado') | trim }}"
      when:
        - enable_patch_install | default(false) | bool

    - name: "Mostrar resultado de instalación"
      ansible.builtin.debug:
        msg:
          - "Servidor: {{ inventory_hostname }}"
          - "Instalación habilitada: {{ enable_patch_install | default(false) }}"
          - "Categorías incluidas: {{ windows_update_categories | default(['*']) }}"
          - "Actualizaciones encontradas: {{ patch_result.found_update_count | default('No ejecutado') }}"
          - "Actualizaciones instaladas: {{ patch_result.installed_update_count | default('No ejecutado') }}"
          - "Reinicio requerido: {{ patch_result.reboot_required | default('No ejecutado') }}"
          - "Fallidas: {{ patch_result.failed_update_count | default('No ejecutado') }}"
          - "Log Windows Update: C:\\Windows\\Temp\\ansible-win-updates.log"

    - name: "Fallar si quedaron actualizaciones fallidas"
      ansible.builtin.fail:
        msg: "Windows Update terminó con {{ patch_result.failed_update_count }} actualizaciones fallidas. Revisar C:\\Windows\\Temp\\ansible-win-updates.log"
      when:
        - enable_patch_install | default(false) | bool
        - patch_result.failed_update_count | default(0) | int > 0


- name: "POSTCHECK | Validación posterior al parchado"
  hosts: windows
  gather_facts: false
  serial: 1

  tasks:
    - name: "Obtener último arranque después del parchado"
      ansible.windows.win_shell: |
        (Get-CimInstance Win32_OperatingSystem).LastBootUpTime
      register: last_boot_post
      changed_when: false

    - name: "Validar estado real de las firmas de Microsoft Defender"
      ansible.windows.win_shell: |
        try {
          Get-MpComputerStatus |
          Select-Object AntivirusSignatureVersion, AntivirusSignatureLastUpdated, AntivirusSignatureAge |
          ConvertTo-Json -Compress
        } catch {
          Write-Output "Microsoft Defender no disponible en este servidor"
        }
      register: defender_status_post
      changed_when: false
      failed_when: false
      when:
        - enable_defender_management | default(true) | bool

    - name: "Validar si hay reinicio pendiente después del parchado"
      ansible.windows.win_shell: |
        $pending = $false

        if (Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Component Based Servicing\RebootPending") {
          $pending = $true
        }

        if (Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsUpdate\Auto Update\RebootRequired") {
          $pending = $true
        }

        if (Test-Path "HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\PendingFileRenameOperations") {
          $pending = $true
        }

        Write-Output $pending
      register: pending_reboot_postcheck
      changed_when: false

    - name: "Obtener últimos hotfix instalados"
      ansible.windows.win_shell: |
        Get-HotFix |
        Sort-Object InstalledOn -Descending |
        Select-Object -First 15 HotFixID, Description, InstalledOn, InstalledBy |
        ConvertTo-Json -Compress
      register: hotfix_post
      changed_when: false

    - name: "Buscar nuevamente actualizaciones disponibles después del parchado"
      ansible.windows.win_updates:
        category_names: "{{ windows_update_categories | default(['*']) }}"
        state: searched
        log_path: C:\Windows\Temp\ansible-win-updates-postcheck.log
      register: updates_postcheck_result
      failed_when: false

    - name: "Consultar eventos recientes de Windows Update"
      ansible.windows.win_shell: |
        Get-WinEvent -LogName "Microsoft-Windows-WindowsUpdateClient/Operational" -MaxEvents 30 |
        Select-Object TimeCreated, Id, Message |
        ConvertTo-Json -Compress
      register: windows_update_events
      changed_when: false
      failed_when: false

    - name: "Validar servicios automáticos detenidos"
      ansible.windows.win_shell: |
        Get-Service |
        Where-Object {$_.StartType -eq "Automatic" -and $_.Status -ne "Running"} |
        Select-Object Name, DisplayName, Status, StartType |
        ConvertTo-Json -Compress
      register: stopped_auto_services
      changed_when: false
      failed_when: false

    - name: "Validar servicios críticos definidos en inventario"
      ansible.windows.win_shell: |
        $services = @({{ servicios_criticos | default([]) | to_json }})
        $result = foreach ($svc in $services) {
          Get-Service -Name $svc -ErrorAction SilentlyContinue |
          Select-Object Name, DisplayName, Status
        }
        $result | ConvertTo-Json -Compress
      register: critical_services_status
      changed_when: false
      failed_when: false
      when:
        - servicios_criticos is defined
        - servicios_criticos | length > 0

    - name: "Mostrar postcheck"
      ansible.builtin.debug:
        msg:
          - "Servidor: {{ inventory_hostname }}"
          - "Ultimo arranque: {{ last_boot_post.stdout | trim }}"
          - "Reinicio pendiente después de parchar: {{ pending_reboot_postcheck.stdout | trim }}"
          - "Firmas Defender (version/fecha/antiguedad dias): {{ defender_status_post.stdout | default('Gestión de Defender deshabilitada para este host') | trim }}"
          - "Ultimos hotfix: {{ hotfix_post.stdout | trim }}"
          - "Actualizaciones pendientes después del parchado: {{ updates_postcheck_result.found_update_count | default(0) }}"
          - "Actualizaciones fallidas en postcheck: {{ updates_postcheck_result.failed_update_count | default(0) }}"
          - "Servicios automaticos detenidos: {{ stopped_auto_services.stdout | trim }}"
          - "Servicios criticos: {{ critical_services_status.stdout | default('No definidos') | trim }}"
          - "Eventos recientes Windows Update: {{ windows_update_events.stdout | default('Sin eventos') | trim }}"

    - name: "Agregar resultado de este servidor al resumen global para Teams"
      ansible.builtin.set_fact:
        resumen_parchado: "{{ hostvars['localhost'].resumen_parchado + [ {
          'host': inventory_hostname,
          'hipervisor': hypervisor_type | default('n/a'),
          'encontradas': patch_result.found_update_count | default(0),
          'instaladas': patch_result.installed_update_count | default(0),
          'fallidas_patch': patch_result.failed_update_count | default(0),
          'reinicio_pendiente': pending_reboot_postcheck.stdout | default('') | trim,
          'defender_info': defender_status_post.stdout | default('Gestión Defender deshabilitada') | trim,
          'pendientes_post': updates_postcheck_result.found_update_count | default(0)
        } ] }}"
      delegate_to: localhost
      delegate_facts: true

    - name: "Advertir si aún quedan actualizaciones pendientes"
      ansible.builtin.debug:
        msg:
          - "ADVERTENCIA: después del parchado aún se detectan {{ updates_postcheck_result.found_update_count }} actualizaciones pendientes."
          - "Revisar C:\\Windows\\Temp\\ansible-win-updates-postcheck.log"
      when:
        - updates_postcheck_result.found_update_count | default(0) | int > 0

    - name: "Fallar si después del parchado queda reinicio pendiente"
      ansible.builtin.fail:
        msg: "El servidor quedó con reinicio pendiente después del parchado. Reiniciar y volver a validar."
      when:
        - fail_on_pending_reboot | default(false) | bool
        - pending_reboot_postcheck.stdout | trim | lower == "true"


- name: "CIERRE | Notificar resumen consolidado a Teams"
  hosts: localhost
  gather_facts: false

  vars:
    teams_webhook_url: "{{ lookup('env', 'TEAMS_WEBHOOK_URL') | default('', true) }}"

  tasks:
    - name: "Construir bloques de Adaptive Card, uno por servidor"
      ansible.builtin.set_fact:
        teams_card_blocks: >-
          {{ teams_card_blocks | default([]) + [{
            "type": "FactSet",
            "facts": [
              {"title": "Servidor", "value": item.host},
              {"title": "Hipervisor", "value": item.hipervisor},
              {"title": "Encontradas", "value": item.encontradas | string},
              {"title": "Instaladas", "value": item.instaladas | string},
              {"title": "Fallidas", "value": item.fallidas_patch | string},
              {"title": "Reinicio pendiente", "value": item.reinicio_pendiente},
              {"title": "Pendientes tras patch", "value": item.pendientes_post | string},
              {"title": "Defender", "value": item.defender_info}
            ]
          }] }}
      loop: "{{ resumen_parchado }}"
      when:
        - enable_teams_notification | default(false) | bool
        - teams_webhook_url | length > 0

    - name: "Calcular totales globales del job"
      ansible.builtin.set_fact:
        total_servidores: "{{ resumen_parchado | length }}"
        total_instaladas: "{{ resumen_parchado | sum(attribute='instaladas') }}"
        total_fallidas: "{{ resumen_parchado | sum(attribute='fallidas_patch') }}"
        total_pendientes: "{{ resumen_parchado | sum(attribute='pendientes_post') }}"
      when:
        - enable_teams_notification | default(false) | bool
        - teams_webhook_url | length > 0
        - resumen_parchado | length > 0

    - name: "Notificar resumen consolidado a Teams"
      ansible.builtin.uri:
        url: "{{ teams_webhook_url }}"
        method: POST
        body_format: json
        headers:
          Content-Type: "application/json"
        body:
          type: "message"
          attachments:
            - contentType: "application/vnd.microsoft.card.adaptive"
              content:
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json"
                type: "AdaptiveCard"
                version: "1.4"
                body: >-
                  {{
                    [
                      {
                        "type": "TextBlock",
                        "text": "Parchado Windows Server - " ~ (cliente_nombre | default(tower_organization_name | default('Cliente no definido'))),
                        "weight": "Bolder",
                        "size": "Large",
                        "wrap": true
                      },
                      {
                        "type": "TextBlock",
                        "text": "Ambiente: " ~ (ambiente_objetivo | default('PRUEBAS')) ~ " · Job AWX: " ~ (tower_job_id | default('N/A') | string),
                        "isSubtle": true,
                        "wrap": true
                      },
                      {
                        "type": "FactSet",
                        "facts": [
                          {"title": "Servidores procesados", "value": total_servidores | default(0) | string},
                          {"title": "Total instaladas", "value": total_instaladas | default(0) | string},
                          {"title": "Total fallidas", "value": total_fallidas | default(0) | string},
                          {"title": "Total pendientes post-parchado", "value": total_pendientes | default(0) | string}
                        ]
                      },
                      {
                        "type": "TextBlock",
                        "text": "Detalle por servidor:",
                        "weight": "Bolder",
                        "wrap": true,
                        "spacing": "Medium"
                      }
                    ] + (teams_card_blocks | default([]))
                  }}
        status_code:
          - 200
          - 202
      when:
        - enable_teams_notification | default(false) | bool
        - teams_webhook_url | length > 0
